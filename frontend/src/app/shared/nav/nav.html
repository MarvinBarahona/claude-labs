<nav
  class="fixed inset-y-0 left-0 z-40 hidden w-48 shrink-0 flex-col gap-1 overflow-y-auto border-r border-border bg-card p-2 text-sm text-card-foreground lg:static lg:z-auto lg:flex"
  [class.hidden]="!open()"
  [class.flex]="open()"
>
  @for (feature of features(); track feature.slug) {
    <a
      [routerLink]="['/', feature.slug]"
      routerLinkActive="nav-link-active bg-secondary text-secondary-foreground"
      (click)="linkClick.emit()"
      class="rounded-sm px-3 py-2 hover:bg-muted"
    >
      {{ feature.label }}
    </a>
  }
</nav>
