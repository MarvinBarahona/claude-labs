<div class="flex h-screen flex-col">
  <header class="flex items-center gap-3 border-b border-border bg-card px-4 py-3">
    <button
      type="button"
      class="rounded-sm p-1.5 text-card-foreground hover:bg-muted lg:hidden"
      (click)="toggleNav()"
      [attr.aria-expanded]="navOpen()"
      aria-label="Toggle navigation"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="size-5">
        <line x1="4" y1="6" x2="20" y2="6" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <line x1="4" y1="18" x2="20" y2="18" />
      </svg>
    </button>
    <h1 class="text-lg font-semibold text-card-foreground">Claude Labs</h1>
  </header>
  <app-fake-mode-banner />
  <div class="relative flex flex-1 overflow-hidden">
    @if (navOpen()) {
      <div class="fixed inset-0 z-30 bg-black/50 lg:hidden" (click)="closeNav()"></div>
    }
    <app-nav [features]="features()" [open]="navOpen()" (linkClick)="closeNav()" />
    <main class="flex-1 overflow-auto p-4">
      <router-outlet />
    </main>
  </div>
</div>
